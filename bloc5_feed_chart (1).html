<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Корм — Блок 5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    font-family: 'Georgia', serif;
    color: #1a1a1a;
    padding: 28px 24px 40px;
    max-width: 100%;
  }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 6px;
  }
  h1 { font-size: 17px; font-weight: bold; }
  .meta { font-family: 'Courier New', monospace; font-size: 11px; color: #888; margin-bottom: 18px; }

  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid #ddd;
    margin-bottom: 20px;
  }
  .tab {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 7px 20px;
    cursor: pointer;
    color: #888;
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
  }
  .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  .tab:hover:not(.active) { color: #444; }

  .panel { display: none; }
  .panel.active { display: block; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 8px 16px;
    margin-bottom: 14px; font-size: 12px;
    font-family: 'Courier New', monospace; color: #444;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; cursor: default; }

  .chart-container {
    position: relative;
    width: 100%;
    height: clamp(260px, 55vw, 480px);
  }

  table { border-collapse: collapse; font-size: 13px; width: 100%; }
  thead th {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: normal;
    color: #888;
    padding: 5px 10px 7px;
    text-align: center;
    border-bottom: 1px solid #ddd;
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody tr:hover td { background: #fafafa; }
  td { padding: 4px 4px; border-bottom: 0.5px solid #eee; }
  td.date-cell {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #555;
    padding-right: 12px;
    white-space: nowrap;
  }
  input[type="number"] {
    width: 58px;
    border: 0.5px solid #ccc;
    border-radius: 3px;
    padding: 3px 6px;
    font-size: 13px;
    font-family: 'Georgia', serif;
    text-align: right;
    color: #1a1a1a;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="number"]:focus { border-color: #2E6FBF; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { opacity: 0.4; }
  input[type="number"]:disabled {
    background: #f5f5f5;
    color: #aaa;
    border-color: #e8e8e8;
    cursor: default;
  }

  .btn-row {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  button.action {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border: 0.5px solid #bbb;
    border-radius: 3px;
    background: #fff;
    color: #333;
    cursor: pointer;
    transition: background 0.12s;
  }
  button.action:hover { background: #f0f0f0; }
  button.action.primary { border-color: #2E6FBF; color: #2E6FBF; }
  button.action.primary:hover { background: #eef4fb; }
  button.action:disabled { opacity: 0.3; pointer-events: none; }
  button.action.unlocked { border-color: #1A9A6A; color: #1A9A6A; }
  button.action.unlocked:hover { background: #edf8f3; }

  .footer {
    margin-top: 24px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #ccc;
    border-top: 0.5px solid #eee;
    padding-top: 10px;
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .overlay.visible { display: flex; }
  .dialog {
    background: #fff;
    border: 0.5px solid #ccc;
    border-radius: 6px;
    padding: 28px 32px;
    width: 260px;
    text-align: center;
  }
  .dialog p { font-size: 14px; margin-bottom: 14px; color: #333; }
  .dialog input[type="password"] {
    width: 100%;
    border: 0.5px solid #ccc;
    border-radius: 3px;
    padding: 8px 10px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    text-align: center;
    letter-spacing: 0.25em;
    outline: none;
    margin-bottom: 6px;
  }
  .dialog input[type="password"]:focus { border-color: #2E6FBF; }
  .dialog .err { font-size: 11px; color: #C04A20; min-height: 16px; margin-bottom: 10px; font-family: 'Courier New', monospace; }
  .dialog .action { width: 100%; padding: 8px; font-size: 13px; border-color: #2E6FBF; color: #2E6FBF; }

  @media (max-width: 500px) {
    body { padding: 18px 14px 32px; }
    h1 { font-size: 15px; }
    .tab { padding: 6px 14px; font-size: 11px; }
    input[type="number"] { width: 48px; font-size: 12px; }
    thead th { font-size: 10px; padding: 4px 6px 5px; }
    td.date-cell { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Суточное потребление корма — Блок 5</h1>
</div>
<div class="meta">кг/сут</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('chart')">График</button>
  <button class="tab" onclick="switchTab('table')">Таблица</button>
</div>

<div class="panel active" id="panel-chart">
  <div class="legend" id="legend"></div>
  <div class="chart-container">
    <canvas id="feedChart" role="img" aria-label="Суточное потребление корма по прудам блока 5"></canvas>
  </div>
</div>

<div class="panel" id="panel-table">
  <div class="btn-row" style="margin-top:0; margin-bottom:14px;">
    <button class="action" id="lockBtn" onclick="toggleLock()">&#128274; Редактировать</button>
  </div>
  <div style="overflow-x: auto;">
    <table id="dataTable">
      <thead>
        <tr>
          <th>Дата</th>
          <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="btn-row">
    <button class="action primary" id="btnAdd" onclick="addRow()" disabled>+ Добавить день</button>
    <button class="action" id="btnDel" onclick="clearLast()" disabled>Удалить последний</button>
  </div>
</div>

<div class="footer" id="footer"></div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <p>Пароль для редактирования</p>
    <input type="password" id="pwdInput" placeholder="••••" maxlength="20"
      onkeydown="if(event.key==='Enter')checkPwd()" />
    <div class="err" id="pwdErr"></div>
    <button class="action" onclick="checkPwd()">Войти</button>
  </div>
</div>

<script>
const PONDS  = ['1','2','3','4','5','6'];
const COLORS = ['#E63329','#F5A800','#1DAF5C','#0077CC','#9B27AF','#E8720C'];

let unlocked = false;

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['chart','table'][i]===name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+name));
  if (name === 'chart' && chart) setTimeout(() => chart.resize(), 10);
}

function toggleLock() {
  if (unlocked) {
    unlocked = false; setEditMode(false);
  } else {
    document.getElementById('overlay').classList.add('visible');
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdErr').textContent = '';
    setTimeout(() => document.getElementById('pwdInput').focus(), 60);
  }
}

function checkPwd() {
  if (document.getElementById('pwdInput').value === '8338') {
    unlocked = true;
    document.getElementById('overlay').classList.remove('visible');
    setEditMode(true);
  } else {
    document.getElementById('pwdErr').textContent = 'Неверный пароль';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

function setEditMode(on) {
  document.querySelectorAll('input[type="number"]').forEach(i => i.disabled = !on);
  document.getElementById('btnAdd').disabled = !on;
  document.getElementById('btnDel').disabled = !on;
  const lb = document.getElementById('lockBtn');
  lb.textContent = on ? '🔓 Заблокировать' : '🔒 Редактировать';
  lb.classList.toggle('unlocked', on);
}

const initialData = [
  { date:'27.03', vals:[33,33,15,34,15,16] },
  { date:'28.03', vals:[41,44,25,40,32.5,32.5] },
  { date:'29.03', vals:[48,52,41,50,41.5,41.5] },
  { date:'30.03', vals:[51,48,55,55,47,47] },
  { date:'31.03', vals:[54,41,48,48,45,49] },
  { date:'01.04', vals:[54,42,51,50,50,50] },
  { date:'02.04', vals:[62,62,62,62,55,55] },
  { date:'03.04', vals:[69,69,66,75,64,64] },
  { date:'04.04', vals:[73,73,66,76,69,69] },
  { date:'05.04', vals:[76,76,61,72,70,70] },
  { date:'06.04', vals:[85,85,65,76,72,72] },
  { date:'07.04', vals:[90,88,70,86,78,78] },
  { date:'08.04', vals:[90,90,79,98,82,82] },
  { date:'09.04', vals:[98,98,81,106,85.5,85.5] },
];

let rows = JSON.parse(JSON.stringify(initialData));

function nextDate(s) {
  const [d,m] = s.split('.').map(Number);
  const dt = new Date(2025, m-1, d);
  dt.setDate(dt.getDate()+1);
  return String(dt.getDate()).padStart(2,'0')+'.'+String(dt.getMonth()+1).padStart(2,'0');
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  rows.forEach((row, ri) => {
    const tr = document.createElement('tr');
    const tdD = document.createElement('td');
    tdD.className = 'date-cell'; tdD.textContent = row.date;
    tr.appendChild(tdD);
    PONDS.forEach((p, pi) => {
      const td = document.createElement('td');
      const inp = document.createElement('input');
      inp.type='number'; inp.min='0'; inp.step='0.5';
      inp.value = row.vals[pi] ?? '';
      inp.disabled = !unlocked;
      inp.addEventListener('input', () => {
        rows[ri].vals[pi] = inp.value==='' ? null : parseFloat(inp.value);
        updateChart();
      });
      td.appendChild(inp); tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  updateFooter();
}

function addRow() {
  rows.push({ date: nextDate(rows[rows.length-1].date), vals:[null,null,null,null,null,null] });
  renderTable(); updateChart();
  setTimeout(() => document.getElementById('tableBody').lastChild.scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
}

function clearLast() {
  if (rows.length > 1) { rows.pop(); renderTable(); updateChart(); }
}

function updateFooter() {
  const f = rows.filter(r => r.vals.some(v => v!==null));
  document.getElementById('footer').textContent = f.length >= 2
    ? 'Блок 5  ·  ' + f[0].date + ' – ' + f[f.length-1].date + '  ·  ' + f.length + ' дней'
    : 'Блок 5';
}

let chart = null;

function buildChart() {
  chart = new Chart(document.getElementById('feedChart'), {
    type: 'line',
    data: {
      labels: rows.map(r => r.date),
      datasets: PONDS.map((p, pi) => ({
        label: p+' пруд',
        data: rows.map(r => r.vals[pi] ?? null),
        borderColor: COLORS[pi],
        backgroundColor: 'transparent',
        borderWidth: 2.5,
        pointRadius: 4,
        pointHoverRadius: 7,
        pointBackgroundColor: '#fff',
        pointBorderColor: COLORS[pi],
        pointBorderWidth: 2,
        tension: 0.3,
        spanGaps: false,
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#ddd',
          borderWidth: 1,
          titleColor: '#333',
          bodyColor: '#444',
          footerColor: '#1a1a1a',
          footerFont: { weight: 'bold' },
          padding: 10,
          callbacks: {
            label: ctx => '  '+ctx.dataset.label+': '+(ctx.parsed.y!==null ? ctx.parsed.y+' кг' : '—'),
            footer: items => {
              const total = items.reduce((s, i) => s + (i.parsed.y ?? 0), 0);
              return 'Итого: ' + Math.round(total * 10) / 10 + ' кг';
            }
          }
        }
      },
      scales: {
        x: {
          ticks: { font:{size:11,family:"'Courier New',monospace"}, color:'#666', autoSkip:false, maxRotation:45 },
          grid: { color:'rgba(0,0,0,0.05)' },
          border: { color:'#ccc' }
        },
        y: {
          title: { display:true, text:'кг/сут', font:{size:11,family:"'Courier New',monospace"}, color:'#888' },
          ticks: { font:{size:11,family:"'Courier New',monospace"}, color:'#666' },
          grid: { color:'rgba(0,0,0,0.05)' },
          border: { color:'#ccc' },
          min: 0
        }
      }
    }
  });
}

function updateChart() {
  if (!chart) return;
  chart.data.labels = rows.map(r => r.date);
  PONDS.forEach((p,pi) => { chart.data.datasets[pi].data = rows.map(r => r.vals[pi] ?? null); });
  chart.update();
  updateFooter();
}

function buildLegend() {
  const leg = document.getElementById('legend');
  PONDS.forEach((p,pi) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','28'); svg.setAttribute('height','12');
    const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1','0'); ln.setAttribute('y1','6'); ln.setAttribute('x2','28'); ln.setAttribute('y2','6');
    ln.setAttribute('stroke',COLORS[pi]); ln.setAttribute('stroke-width','2.5');
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx','14'); dot.setAttribute('cy','6'); dot.setAttribute('r','3.5');
    dot.setAttribute('fill','#fff'); dot.setAttribute('stroke',COLORS[pi]); dot.setAttribute('stroke-width','2');
    svg.appendChild(ln); svg.appendChild(dot);
    const lbl = document.createElement('span');
    lbl.textContent = p+' пруд';
    item.appendChild(svg); item.appendChild(lbl);
    leg.appendChild(item);
  });
}

renderTable();
buildLegend();
buildChart();
</script>
</body>
</html>
