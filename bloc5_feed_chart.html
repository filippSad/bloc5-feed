<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Потребление корма — Блок 5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    font-family: 'Georgia', serif;
    color: #1a1a1a;
    padding: 36px 44px 48px;
    max-width: 960px;
    margin: 0 auto;
  }
  h1 { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
  .meta { font-family: 'Courier New', monospace; font-size: 12px; color: #666; margin-bottom: 24px; }

  .layout { display: flex; gap: 40px; align-items: flex-start; }
  .table-side { flex-shrink: 0; }
  .chart-side { flex: 1; min-width: 0; }

  table { border-collapse: collapse; font-size: 13px; }
  thead th {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: normal;
    color: #888;
    padding: 4px 10px 6px;
    text-align: center;
    border-bottom: 1px solid #ddd;
  }
  thead th:first-child { text-align: left; }
  tbody tr:hover td { background: #f9f9f9; }
  td {
    padding: 3px 4px;
    border-bottom: 0.5px solid #eee;
  }
  td.date-cell {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #555;
    padding-right: 10px;
    white-space: nowrap;
  }
  input[type="number"] {
    width: 54px;
    border: 0.5px solid #ccc;
    border-radius: 3px;
    padding: 3px 6px;
    font-size: 13px;
    font-family: 'Georgia', serif;
    text-align: right;
    color: #1a1a1a;
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="number"]:focus { border-color: #2E6FBF; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { opacity: 0.4; }
  input[type="number"]:disabled {
    background: #f5f5f5;
    color: #aaa;
    border-color: #e0e0e0;
    cursor: default;
  }

  .btn-row { margin-top: 12px; display: flex; gap: 8px; align-items: center; }
  button {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border: 0.5px solid #bbb;
    border-radius: 3px;
    background: #fff;
    color: #333;
    cursor: pointer;
    transition: background 0.12s;
  }
  button:hover { background: #f0f0f0; }
  button.primary { border-color: #2E6FBF; color: #2E6FBF; }
  button.primary:hover { background: #eef4fb; }
  button:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

  .lock-btn {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border: 0.5px solid #bbb;
    border-radius: 3px;
    background: #fff;
    color: #888;
    cursor: pointer;
    transition: background 0.12s;
    margin-left: auto;
  }
  .lock-btn:hover { background: #f5f5f5; }
  .lock-btn.unlocked { color: #1A9A6A; border-color: #1A9A6A; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 10px 18px;
    margin-bottom: 12px; font-size: 12px;
    font-family: 'Courier New', monospace; color: #444;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }

  .chart-container { position: relative; width: 100%; height: 340px; }

  .footer {
    margin-top: 20px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #bbb;
    border-top: 0.5px solid #e8e8e8;
    padding-top: 10px;
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .overlay.visible { display: flex; }
  .dialog {
    background: #fff;
    border: 0.5px solid #ccc;
    border-radius: 6px;
    padding: 28px 32px;
    width: 280px;
    text-align: center;
  }
  .dialog p { font-size: 14px; margin-bottom: 16px; color: #333; }
  .dialog input[type="password"] {
    width: 100%;
    border: 0.5px solid #ccc;
    border-radius: 3px;
    padding: 7px 10px;
    font-size: 15px;
    font-family: 'Courier New', monospace;
    text-align: center;
    letter-spacing: 0.2em;
    outline: none;
    margin-bottom: 6px;
  }
  .dialog input[type="password"]:focus { border-color: #2E6FBF; }
  .dialog .err { font-size: 11px; color: #C04A20; min-height: 16px; margin-bottom: 10px; font-family: 'Courier New', monospace; }
  .dialog button { width: 100%; padding: 8px; font-size: 13px; border-color: #2E6FBF; color: #2E6FBF; }
  .dialog button:hover { background: #eef4fb; }

  @media (max-width: 680px) {
    body { padding: 20px 16px 32px; }
    .layout { flex-direction: column; gap: 24px; }
    input[type="number"] { width: 46px; }
  }
</style>
</head>
<body>

<h1>Суточное потребление корма — Блок 5</h1>
<div class="meta">Penaeus vannamei &nbsp;·&nbsp; кг/сут</div>

<div class="layout">
  <div class="table-side">
    <table id="dataTable">
      <thead>
        <tr>
          <th>Дата</th>
          <th>1.5</th>
          <th>2.5</th>
          <th>3.5</th>
          <th>4.5</th>
          <th>5.5</th>
          <th>6.5</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="btn-row">
      <button class="primary" id="btnAdd" onclick="addRow()" disabled>+ Добавить день</button>
      <button id="btnDel" onclick="clearLast()" disabled>Удалить последний</button>
      <button class="lock-btn" id="lockBtn" onclick="toggleLock()">&#128274; Редактировать</button>
    </div>
  </div>

  <div class="chart-side">
    <div class="legend" id="legend"></div>
    <div class="chart-container">
      <canvas id="feedChart" role="img" aria-label="Суточное потребление корма по прудам блока 5"></canvas>
    </div>
  </div>
</div>

<div class="footer" id="footer"></div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <p>Введите пароль для редактирования</p>
    <input type="password" id="pwdInput" placeholder="••••" maxlength="20" onkeydown="if(event.key==='Enter')checkPwd()" />
    <div class="err" id="pwdErr"></div>
    <button onclick="checkPwd()">Войти</button>
  </div>
</div>

<script>
const PONDS = ['1.5','2.5','3.5','4.5','5.5','6.5'];
const COLORS = ['#E63329','#F5A800','#1DAF5C','#0077CC','#9B27AF','#E8720C'];
const DASHES = [[],[],[],[],[],[]];

const PWD_HASH = '6a8b3fd7c2e19045df3a7b50c4d68912f1e2b3c4d5e6f7a8b9c0d1e2f3a4b5c';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

let unlocked = false;

function toggleLock() {
  if (unlocked) {
    unlocked = false;
    setEditMode(false);
  } else {
    document.getElementById('overlay').classList.add('visible');
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdErr').textContent = '';
    setTimeout(() => document.getElementById('pwdInput').focus(), 50);
  }
}

async function checkPwd() {
  const val = document.getElementById('pwdInput').value;
  const hash = await sha256(val);
  if (val === '8338') {
    unlocked = true;
    document.getElementById('overlay').classList.remove('visible');
    setEditMode(true);
  } else {
    document.getElementById('pwdErr').textContent = 'Неверный пароль';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

function setEditMode(on) {
  document.querySelectorAll('input[type="number"]').forEach(inp => inp.disabled = !on);
  document.getElementById('btnAdd').disabled = !on;
  document.getElementById('btnDel').disabled = !on;
  const lb = document.getElementById('lockBtn');
  if (on) {
    lb.textContent = '🔓 Заблокировать';
    lb.classList.add('unlocked');
  } else {
    lb.textContent = '🔒 Редактировать';
    lb.classList.remove('unlocked');
  }
}

const initialData = [
  { date:'27.03', vals:[33,33,15,34,15,16] },
  { date:'28.03', vals:[41,44,25,40,32.5,32.5] },
  { date:'29.03', vals:[48,52,41,50,41.5,41.5] },
  { date:'30.03', vals:[51,48,55,55,47,47] },
  { date:'31.03', vals:[54,41,48,48,45,49] },
  { date:'01.04', vals:[54,42,51,50,50,50] },
  { date:'02.04', vals:[62,62,62,62,55,55] },
  { date:'03.04', vals:[69,69,66,75,64,64] },
  { date:'04.04', vals:[73,73,66,76,69,69] },
  { date:'05.04', vals:[76,76,61,72,70,70] },
  { date:'06.04', vals:[85,85,65,76,72,72] },
  { date:'07.04', vals:[90,88,70,86,78,78] },
  { date:'08.04', vals:[90,90,79,98,82,82] },
  { date:'09.04', vals:[98,98,81,106,85.5,85.5] },
];

let rows = JSON.parse(JSON.stringify(initialData));

function nextDate(dateStr) {
  const [d, m] = dateStr.split('.').map(Number);
  const dt = new Date(2025, m - 1, d);
  dt.setDate(dt.getDate() + 1);
  return String(dt.getDate()).padStart(2,'0') + '.' + String(dt.getMonth()+1).padStart(2,'0');
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  rows.forEach((row, ri) => {
    const tr = document.createElement('tr');
    const tdDate = document.createElement('td');
    tdDate.className = 'date-cell';
    tdDate.textContent = row.date;
    tr.appendChild(tdDate);
    PONDS.forEach((p, pi) => {
      const td = document.createElement('td');
      const inp = document.createElement('input');
      inp.type = 'number';
      inp.min = '0';
      inp.step = '0.5';
      inp.value = row.vals[pi] !== null && row.vals[pi] !== undefined ? row.vals[pi] : '';
      inp.disabled = !unlocked;
      inp.addEventListener('input', () => {
        rows[ri].vals[pi] = inp.value === '' ? null : parseFloat(inp.value);
        updateChart();
      });
      td.appendChild(inp);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  updateFooter();
}

function addRow() {
  const lastDate = rows.length > 0 ? rows[rows.length-1].date : '09.04';
  rows.push({ date: nextDate(lastDate), vals: [null,null,null,null,null,null] });
  renderTable();
  updateChart();
  setTimeout(() => {
    document.getElementById('tableBody').lastChild.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 50);
}

function clearLast() {
  if (rows.length > 1) { rows.pop(); renderTable(); updateChart(); }
}

function updateFooter() {
  const filled = rows.filter(r => r.vals.some(v => v !== null));
  document.getElementById('footer').textContent = filled.length >= 2
    ? 'Блок 5  ·  ' + filled[0].date + ' – ' + filled[filled.length-1].date + '  ·  ' + filled.length + ' дней'
    : 'Блок 5';
}

let chart = null;

function buildChart() {
  const ctx = document.getElementById('feedChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: rows.map(r => r.date),
      datasets: PONDS.map((p, pi) => ({
        label: 'Пруд ' + p,
        data: rows.map(r => r.vals[pi] ?? null),
        borderColor: COLORS[pi],
        backgroundColor: 'transparent',
        borderWidth: 2.5,
        borderDash: DASHES[pi],
        pointRadius: 4,
        pointHoverRadius: 6,
        pointBackgroundColor: '#fff',
        pointBorderColor: COLORS[pi],
        pointBorderWidth: 2,
        tension: 0.3,
        spanGaps: false,
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#fff',
          borderColor: '#ddd',
          borderWidth: 1,
          titleColor: '#333',
          bodyColor: '#444',
          padding: 10,
          callbacks: {
            label: ctx => '  ' + ctx.dataset.label + ': ' + (ctx.parsed.y !== null ? ctx.parsed.y + ' кг' : '—')
          }
        }
      },
      scales: {
        x: {
          ticks: { font: { size: 11, family: "'Courier New', monospace" }, color: '#666', autoSkip: false, maxRotation: 45 },
          grid: { color: 'rgba(0,0,0,0.05)' },
          border: { color: '#ccc' }
        },
        y: {
          title: { display: true, text: 'кг/сут', font: { size: 11, family: "'Courier New', monospace" }, color: '#888' },
          ticks: { font: { size: 11, family: "'Courier New', monospace" }, color: '#666' },
          grid: { color: 'rgba(0,0,0,0.05)' },
          border: { color: '#ccc' },
          min: 0,
        }
      }
    }
  });
}

function updateChart() {
  if (!chart) return;
  chart.data.labels = rows.map(r => r.date);
  PONDS.forEach((p, pi) => {
    chart.data.datasets[pi].data = rows.map(r => r.vals[pi] ?? null);
  });
  chart.update();
  updateFooter();
}

function buildLegend() {
  const legend = document.getElementById('legend');
  PONDS.forEach((p, pi) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','28'); svg.setAttribute('height','12');
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1','0'); line.setAttribute('y1','6');
    line.setAttribute('x2','28'); line.setAttribute('y2','6');
    line.setAttribute('stroke', COLORS[pi]);
    line.setAttribute('stroke-width','2.5');
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx','14'); dot.setAttribute('cy','6'); dot.setAttribute('r','3.5');
    dot.setAttribute('fill','#fff');
    dot.setAttribute('stroke', COLORS[pi]);
    dot.setAttribute('stroke-width','2');
    svg.appendChild(line); svg.appendChild(dot);
    const lbl = document.createElement('span');
    lbl.textContent = 'Пруд ' + p;
    item.appendChild(svg); item.appendChild(lbl);
    legend.appendChild(item);
  });
}

renderTable();
buildLegend();
buildChart();
</script>
</body>
</html>
