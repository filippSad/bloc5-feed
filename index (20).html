<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кормление</title>
<link rel="apple-touch-icon" href="icon-feed.png">
<meta name="apple-mobile-web-app-title" content="Кормление">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: 'Georgia', serif; color: #1a1a1a; padding: 28px 24px 40px; max-width: 100%; }
  h1 { font-size: 17px; font-weight: bold; margin-bottom: 4px; }
  .meta { font-family: 'Courier New', monospace; font-size: 11px; color: #888; margin-bottom: 20px; }

  .bloc-tabs { display: flex; border-bottom: 2px solid #1a1a1a; margin-bottom: 24px; }
  .bloc-tab { font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold; padding: 9px 28px; cursor: pointer; color: #aaa; border: none; background: none; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color 0.15s; }
  .bloc-tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  .bloc-tab:hover:not(.active) { color: #555; }

  .bloc-panel { display: none; }
  .bloc-panel.active { display: block; }

  .legend { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-bottom: 14px; font-size: 12px; font-family: 'Courier New', monospace; color: #444; }
  .legend-item { display: flex; align-items: center; gap: 6px; cursor: pointer; opacity: 1; transition: opacity 0.15s; user-select: none; }
  .legend-item:hover { opacity: 0.7; }
  .legend-item.hidden { opacity: 0.3; }

  .chart-container { position: relative; width: 100%; max-width: 700px; height: clamp(240px, 50vw, 400px); }

  .status { font-family: 'Courier New', monospace; font-size: 11px; color: #aaa; margin-bottom: 10px; min-height: 16px; }
  .status.err { color: #C04A20; }

  .footer { margin-top: 20px; font-family: 'Courier New', monospace; font-size: 11px; color: #ccc; border-top: 0.5px solid #eee; padding-top: 10px; }

  .legend-hint { font-family: 'Courier New', monospace; font-size: 10px; color: #bbb; margin-bottom: 10px; }

  @media (max-width: 500px) {
    body { padding: 18px 14px 32px; }
    h1 { font-size: 15px; }
    .bloc-tab { padding: 7px 18px; font-size: 12px; }
  }
</style>
</head>
<body>

<h1>Суточное потребление корма</h1>
<div class="meta">кг/сут</div>

<div class="bloc-tabs">
  <button class="bloc-tab active" onclick="switchBloc('b5')">Блок 5</button>
  <button class="bloc-tab" onclick="switchBloc('b6')">Блок 6</button>
</div>

<div class="bloc-panel active" id="bloc-b5">
  <div class="legend" id="b5-legend"></div>
  <div class="legend-hint">нажмите на пруд чтобы скрыть/показать</div>
  <div class="status" id="b5-status">загрузка...</div>
  <div class="chart-container">
    <canvas id="b5-canvas" role="img" aria-label="Блок 5"></canvas>
  </div>
  <div class="footer" id="b5-footer"></div>
</div>

<div class="bloc-panel" id="bloc-b6">
  <div class="legend" id="b6-legend"></div>
  <div class="legend-hint">нажмите на пруд чтобы скрыть/показать</div>
  <div class="status" id="b6-status">загрузка...</div>
  <div class="chart-container">
    <canvas id="b6-canvas" role="img" aria-label="Блок 6"></canvas>
  </div>
  <div class="footer" id="b6-footer"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbx_-h_k5Zm9aDtsBC1BhTEFURWJWfDwUQtYXhz0LlQLbzqrBZf2ZawbrGw_Mcfq-UINmQ/exec';

const CFG = {
  b5: { ponds: ['1','2','3','4','5','6','ДС-1','ДС-2'], colors: ['#E63329','#F5A800','#1DAF5C','#0077CC','#9B27AF','#E8720C','#00B5CC','#8B6914'] },
  b6: { ponds: ['1','2','3','4','5'],         colors: ['#E63329','#F5A800','#1DAF5C','#0077CC','#9B27AF'] },
};

const charts = {};

function switchBloc(id) {
  document.querySelectorAll('.bloc-tab').forEach((t,i) => t.classList.toggle('active', ['b5','b6'][i]===id));
  document.querySelectorAll('.bloc-panel').forEach(p => p.classList.toggle('active', p.id==='bloc-'+id));
  if (charts[id]) setTimeout(() => charts[id].resize(), 10);
}

function parseDate(val) {
  const s = String(val);
  if (s.includes('T')) { const p = s.split('T')[0].split('-'); return p[2]+'.'+p[1]; }
  if (s.match(/^\d{2}\.\d{2}/)) return s.slice(0,5);
  return null;
}

function jsonp(params) {
  return new Promise(resolve => {
    const cb = 'cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    const t = setTimeout(() => { cleanup(); resolve(null); }, 12000);
    function cleanup() { clearTimeout(t); delete window[cb]; s.parentNode && s.parentNode.removeChild(s); }
    window[cb] = d => { cleanup(); resolve(d); };
    s.onerror = () => { cleanup(); resolve(null); };
    s.src = API+'?'+Object.entries({...params,callback:cb}).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    document.head.appendChild(s);
  });
}

function buildLegend(bloc) {
  const leg = document.getElementById(bloc+'-legend');
  CFG[bloc].ponds.forEach((p,pi) => {
    const item = document.createElement('div'); item.className = 'legend-item';
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','28'); svg.setAttribute('height','12');
    const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1','0'); ln.setAttribute('y1','6'); ln.setAttribute('x2','28'); ln.setAttribute('y2','6');
    ln.setAttribute('stroke',CFG[bloc].colors[pi]); ln.setAttribute('stroke-width','2.5');
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx','14'); dot.setAttribute('cy','6'); dot.setAttribute('r','3.5');
    dot.setAttribute('fill','#fff'); dot.setAttribute('stroke',CFG[bloc].colors[pi]); dot.setAttribute('stroke-width','2');
    svg.appendChild(ln); svg.appendChild(dot);
    const lbl = document.createElement('span'); lbl.textContent = p+' пруд';
    item.appendChild(svg); item.appendChild(lbl);
    item.addEventListener('click', () => {
      const chart = charts[bloc];
      if (!chart) return;
      const ds = chart.data.datasets[pi];
      ds.hidden = !ds.hidden;
      item.classList.toggle('hidden', ds.hidden);
      chart.update();
    });
    leg.appendChild(item);
  });
}

Chart.Tooltip.positioners.smartEdge = function(els, pos) {
  const ca = this.chart.chartArea;
  const mid = ca.left + (ca.right - ca.left) / 2;
  return { x: pos.x < mid ? ca.right - 10 : ca.left + 10, y: ca.top + 10 };
};

function renderChart(bloc, rows) {
  const cfg = CFG[bloc];
  const labels = rows.map(r => r.date);
  const datasets = cfg.ponds.map((p,pi) => ({
    label: p+' пруд',
    data: rows.map(r => r.vals[pi] ?? null),
    borderColor: cfg.colors[pi],
    backgroundColor: 'transparent',
    borderWidth: 2.5,
    pointRadius: 4, pointHoverRadius: 7,
    pointBackgroundColor: '#fff',
    pointBorderColor: cfg.colors[pi],
    pointBorderWidth: 2,
    tension: 0.3, spanGaps: false,
  }));

  if (charts[bloc]) charts[bloc].destroy();

  charts[bloc] = new Chart(document.getElementById(bloc+'-canvas'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display: false },
        tooltip: {
          position: 'smartEdge',
          backgroundColor: '#fff', borderColor: '#ddd', borderWidth: 1,
          titleColor: '#333', bodyColor: '#444',
          footerColor: '#1a1a1a', footerFont: { weight:'bold' },
          padding: 10,
          callbacks: {
            label: ctx => '  '+ctx.dataset.label+': '+(ctx.parsed.y!==null ? ctx.parsed.y+' кг' : '—'),
            footer: items => 'Итого: '+Math.round(items.reduce((s,i)=>s+(i.parsed.y??0),0)*10)/10+' кг'
          }
        }
      },
      scales: {
        x: { ticks: { font:{size:11,family:"'Courier New',monospace"}, color:'#666', autoSkip:false, maxRotation:45 }, grid: { color:'rgba(0,0,0,0.05)' }, border: { color:'#ccc' } },
        y: { title: { display:true, text:'кг/сут', font:{size:11,family:"'Courier New',monospace"}, color:'#888' }, ticks: { font:{size:11,family:"'Courier New',monospace"}, color:'#666' }, grid: { color:'rgba(0,0,0,0.05)' }, border: { color:'#ccc' }, min: 0 }
      }
    }
  });

  const f = rows.filter(r => r.vals.some(v => v!==null));
  const label = bloc==='b5' ? 'Блок 5' : 'Блок 6';
  document.getElementById(bloc+'-footer').textContent = f.length >= 2
    ? label+'  ·  '+f[0].date+' – '+f[f.length-1].date+'  ·  '+f.length+' дней'
    : label;
}

async function load(bloc) {
  const raw = await jsonp({ action: 'read', bloc });
  const st = document.getElementById(bloc+'-status');

  if (!raw) { st.textContent = 'нет связи с таблицей'; st.className = 'status err'; return; }

  const rows = raw
    .filter(row => row && row[0] && String(row[0]).trim() !== '' && String(row[0]) !== 'Дата')
    .map(row => {
      const date = parseDate(row[0]);
      if (!date) return null;
      return { date, vals: row.slice(1).map(v => (v===''||v===null||v===undefined) ? null : parseFloat(v)) };
    }).filter(Boolean);

  if (rows.length === 0) { st.textContent = 'таблица пустая — добавьте данные в Google Sheets'; st.className = 'status err'; return; }

  st.textContent = '';
  renderChart(bloc, rows);
}

buildLegend('b5');
buildLegend('b6');
load('b5');
load('b6');
</script>
</body>
</html>
