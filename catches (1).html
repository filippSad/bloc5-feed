<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контрольные заловы</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: 'Georgia', serif; color: #1a1a1a; padding: 28px 24px 40px; max-width: 100%; }
  h1 { font-size: 17px; font-weight: bold; margin-bottom: 4px; }
  .meta { font-family: 'Courier New', monospace; font-size: 11px; color: #888; margin-bottom: 20px; }

  .bloc-tabs { display: flex; border-bottom: 2px solid #1a1a1a; margin-bottom: 24px; }
  .bloc-tab { font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold; padding: 9px 28px; cursor: pointer; color: #aaa; border: none; background: none; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color 0.15s; }
  .bloc-tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  .bloc-tab:hover:not(.active) { color: #555; }

  .bloc-panel { display: none; }
  .bloc-panel.active { display: block; }

  .status { font-family: 'Courier New', monospace; font-size: 11px; color: #aaa; margin-bottom: 14px; min-height: 16px; }
  .status.err { color: #C04A20; }

  table { border-collapse: collapse; font-size: 13px; font-family: 'Courier New', monospace; width: 100%; max-width: 560px; }
  thead th { color: #888; font-weight: normal; padding: 5px 16px 7px 0; border-bottom: 1px solid #ddd; white-space: nowrap; text-align: right; }
  thead th:first-child { text-align: left; }
  tbody td { padding: 5px 16px 5px 0; border-bottom: 0.5px solid #f0f0f0; text-align: right; white-space: nowrap; }
  tbody td:first-child { text-align: left; color: #555; }
  tbody td:nth-child(2) { text-align: left; }
  .date-row td { font-weight: bold; color: #1a1a1a; padding-top: 14px; border-bottom: none; }
  .date-row td:first-child { font-size: 13px; }
  .pos { color: #1A9A6A; }
  .neg { color: #C04A20; }
  .neu { color: #aaa; }

  .footer { margin-top: 24px; font-family: 'Courier New', monospace; font-size: 11px; color: #ccc; border-top: 0.5px solid #eee; padding-top: 10px; }

  @media (max-width: 500px) {
    body { padding: 18px 14px 32px; }
    h1 { font-size: 15px; }
    .bloc-tab { padding: 7px 18px; font-size: 12px; }
    table { font-size: 12px; }
    thead th, tbody td { padding-right: 10px; }
  }
</style>
</head>
<body>

<h1>Контрольные заловы</h1>
<div class="meta">динамика роста креветки</div>

<div class="bloc-tabs">
  <button class="bloc-tab active" onclick="switchBloc('b5')">Блок 5</button>
  <button class="bloc-tab" onclick="switchBloc('b6')">Блок 6</button>
</div>

<div class="bloc-panel active" id="bloc-b5">
  <div class="status" id="b5-status">загрузка...</div>
  <div style="overflow-x:auto;">
    <table>
      <thead><tr><th>Дата / День</th><th>Пруд</th><th>Шт/кг</th><th>Масса, г</th><th>Динамика, %/сут</th></tr></thead>
      <tbody id="b5-tbody"></tbody>
    </table>
  </div>
  <div class="footer" id="b5-footer"></div>
</div>

<div class="bloc-panel" id="bloc-b6">
  <div class="status" id="b6-status">загрузка...</div>
  <div style="overflow-x:auto;">
    <table>
      <thead><tr><th>Дата / День</th><th>Пруд</th><th>Шт/кг</th><th>Масса, г</th><th>Динамика, %/сут</th></tr></thead>
      <tbody id="b6-tbody"></tbody>
    </table>
  </div>
  <div class="footer" id="b6-footer"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbz7MVgaXjxVBc42D6yGMReykkFH_l7NOmPnnib3TIQyR8JPfPAUinJg0WrYrDdO5L8b/exec';

const CFG = {
  b5: { ponds: ['1','2','3','4','5','6'] },
  b6: { ponds: ['1','2','4','5'] },
};

function switchBloc(id) {
  document.querySelectorAll('.bloc-tab').forEach((t,i) => t.classList.toggle('active', ['b5','b6'][i]===id));
  document.querySelectorAll('.bloc-panel').forEach(p => p.classList.toggle('active', p.id==='bloc-'+id));
}

function parseNum(v) {
  if (v === null || v === undefined || v === '') return null;
  return parseFloat(String(v).trim().replace(/^0+(\d)/, '$1'));
}

function jsonp(params) {
  return new Promise(resolve => {
    const cb = 'cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    const t = setTimeout(() => { cleanup(); resolve(null); }, 12000);
    function cleanup() { clearTimeout(t); delete window[cb]; s.parentNode && s.parentNode.removeChild(s); }
    window[cb] = d => { cleanup(); resolve(d); };
    s.onerror = () => { cleanup(); resolve(null); };
    s.src = API+'?'+Object.entries({...params,callback:cb}).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    document.head.appendChild(s);
  });
}

function processRows(raw, ponds) {
  const dateOrder = [];
  const dateMap = {};

  raw.forEach(row => {
    const date  = String(row[0]).trim();
    const day   = parseInt(row[1]) || 0;
    const prud  = String(row[2]).trim();
    const shtkg = parseNum(row[3]);
    const mass  = parseNum(row[4]);
    if (!date || !prud) return;
    if (!dateMap[date]) { dateMap[date] = { day, ponds: {} }; dateOrder.push(date); }
    dateMap[date].ponds[prud] = { shtkg, mass };
  });

  // динамика: (масса2 - масса1) / (день2 - день1)
  const dynamics = {};
  ponds.forEach(p => {
    let prevDay = null, prevMass = null;
    dateOrder.forEach(date => {
      const entry = dateMap[date]?.ponds[p];
      const mass = entry?.mass ?? null;
      const day  = dateMap[date]?.day ?? null;
      if (mass !== null && prevMass !== null && day !== null && prevDay !== null && day !== prevDay) {
        dynamics[date+'_'+p] = ((mass - prevMass) / prevMass * 100) / (day - prevDay);
      }
      if (mass !== null) { prevMass = mass; prevDay = day; }
    });
  });

  return { dateOrder, dateMap, dynamics };
}

function renderTable(bloc, dateOrder, dateMap, dynamics) {
  const ponds = CFG[bloc].ponds;
  const tbody = document.getElementById(bloc+'-tbody');
  tbody.innerHTML = '';

  dateOrder.forEach(date => {
    const { day, ponds: pondData } = dateMap[date];

    // строка с датой
    const trDate = document.createElement('tr');
    trDate.className = 'date-row';
    const tdLabel = document.createElement('td');
    tdLabel.textContent = date + '  ·  день ' + day;
    tdLabel.setAttribute('colspan', '5');
    trDate.appendChild(tdLabel);
    tbody.appendChild(trDate);

    // строки по прудам
    ponds.forEach(p => {
      const entry = pondData[p];
      if (!entry) return;
      const tr = document.createElement('tr');

      const tdDate = document.createElement('td'); tdDate.textContent = ''; tr.appendChild(tdDate);
      const tdP = document.createElement('td'); tdP.textContent = p+' пруд'; tr.appendChild(tdP);
      const tdS = document.createElement('td'); tdS.textContent = entry.shtkg ?? '—'; tr.appendChild(tdS);
      const tdM = document.createElement('td'); tdM.textContent = entry.mass !== null ? entry.mass.toFixed(2) : '—'; tr.appendChild(tdM);

      const tdD = document.createElement('td');
      const dyn = dynamics[date+'_'+p];
      if (dyn !== undefined) {
        tdD.textContent = (dyn >= 0 ? '+' : '') + dyn.toFixed(2) + '%';
        tdD.className = dyn > 0 ? 'pos' : dyn < 0 ? 'neg' : 'neu';
      } else {
        tdD.textContent = '—'; tdD.className = 'neu';
      }
      tr.appendChild(tdD);
      tbody.appendChild(tr);
    });
  });
}

async function load(bloc) {
  const raw = await jsonp({ bloc });
  const st = document.getElementById(bloc+'-status');

  if (!raw || raw.length === 0) {
    st.textContent = 'нет данных'; st.className = 'status err'; return;
  }

  const { dateOrder, dateMap, dynamics } = processRows(raw, CFG[bloc].ponds);

  if (dateOrder.length === 0) {
    st.textContent = 'таблица пустая'; st.className = 'status err'; return;
  }

  st.textContent = '';
  renderTable(bloc, dateOrder, dateMap, dynamics);

  const last = dateOrder[dateOrder.length-1];
  const label = bloc==='b5' ? 'Блок 5' : 'Блок 6';
  document.getElementById(bloc+'-footer').textContent =
    label+'  ·  последний залов: '+last+' (день '+dateMap[last].day+')';
}

load('b5');
load('b6');
</script>
</body>
</html>
